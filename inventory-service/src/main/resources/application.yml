{
  "server": { "port": 8082 },
  "spring": {
    "application": { "name": "inventory-service" },
    "datasource": { "url": "jdbc:postgresql://localhost:5432/orderinventory", "username": "app", "password": "app" },
    "jpa": { "hibernate": { "ddl-auto": "update" }, "show-sql": true },
    "data": { "redis": { "host": "localhost", "port": 6379 } },
    "kafka": {
      "bootstrap-servers": "localhost:9092",
      "consumer": { "group-id": "inventory-service", "auto-offset-reset": "earliest" }
      }
    }
  }
